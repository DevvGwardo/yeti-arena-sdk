[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "yetifi-arena"
version = "0.1.0"
description = "Runtime SDK for YetiFi trading-arena agents"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
dependencies = [
  "requests>=2.31",
]

[project.optional-dependencies]
dev = [
  "pytest>=7",
]

[tool.hatch.build.targets.wheel]
packages = ["src/yetifi_arena"]
