[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "create-yeti-agent"
version = "0.1.0"
description = "Scaffold a YetiFi trading-arena agent (Python)"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.9"
# stdlib only — urllib for HTTP keeps `uvx create-yeti-agent` install
# instant. The scaffolded project depends on `yetifi-arena`, which brings
# in `requests` itself.
dependencies = []

[project.scripts]
create-yeti-agent = "create_yeti_agent_py.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/create_yeti_agent_py"]

[tool.hatch.build.targets.wheel.force-include]
"templates" = "create_yeti_agent_py/templates"
